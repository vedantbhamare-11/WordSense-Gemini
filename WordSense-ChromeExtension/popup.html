<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WordSense Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="heading">
      <h1>WordSense AI</h1>
      <button id="toggle-btn" class="off" title="Toggle Extension Status">
        <img id="toggle-icon" src="power-button-off.png" alt="Power" style="width: 20px; height: 20px;" />
      </button>
    </div>

    <div class="container">
      <div class="field-buttons">
        <button class="field-btn" data-field="General">General</button>
        <button class="field-btn" data-field="Science">Science</button>
        <button class="field-btn" data-field="Medical">Medical</button>
        <button class="field-btn" data-field="Law">Law</button>
        <button class="field-btn" data-field="Computer Science">Computer</button>
        <button class="field-btn" data-field="Architecture">Architecture</button>
      </div>

      <div class="field-custom-buttons">
        <div id="custom-field-button-container"></div>
      </div>

      <div class="custom-field-container">
        <input type="text" id="custom-field-input" placeholder="Type a custom context (e.g. Cricket)" />
        <div class="custom-field-actions">
          <button id="save-custom-field">Save Field</button>
          <button id="reset-custom-field">Clear</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
